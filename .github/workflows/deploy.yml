name: Deploy Escal (FTP IONOS)

# Déploiement automatique à chaque push sur main.
# - admin-escal  → build statique  → FTP vers /admin
# - modul-escal  → build statique  → FTP vers /calcul
# - api (PHP)    → copie directe   → FTP vers /api  (config.php préservé)

on:
  push:
    branches: [main]
  workflow_dispatch:        # bouton "Run workflow" manuel

# Évite deux déploiements concurrents
concurrency:
  group: deploy-ftp
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────
  admin:
    name: Admin → /admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-escal/package-lock.json

      - name: Build admin
        working-directory: admin-escal
        run: |
          npm ci
          npm run build

      - name: Deploy admin via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./admin-escal/out/
          server-dir: ./admin/

  # ────────────────────────────────────────────────────────────────
  calcul:
    name: Calcul → /calcul
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: modul-escal/package-lock.json

      - name: Build calcul
        working-directory: modul-escal
        run: |
          npm ci
          npm run build

      - name: Deploy calcul via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./modul-escal/out/
          server-dir: ./calcul/

  # ────────────────────────────────────────────────────────────────
  api:
    name: API PHP → /api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy api via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./api/
          server-dir: ./api/
          # IMPORTANT : ne jamais écraser/supprimer les secrets ni les uploads
          exclude: |
            **/config.php
            **/uploads/**
            **/.git*
            **/.ftp-deploy-sync-state.json
