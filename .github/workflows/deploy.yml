name: Deploy Escal (SFTP IONOS)

# Déploiement automatique à chaque push sur main (IONOS = SFTP uniquement).
# - admin-escal  → build statique  → SFTP vers ~/admin
# - modul-escal  → build statique  → SFTP vers ~/calcul
# - api (PHP)    → copie directe   → SFTP vers ~/api
#
# Upload-only : les fichiers présents sur le serveur mais absents du repo
# (config.php, uploads/) ne sont JAMAIS supprimés.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-sftp
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────
  admin:
    name: Admin → /admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-escal/package-lock.json
      - name: Build admin
        working-directory: admin-escal
        run: |
          npm ci
          npm run build
      - name: Deploy admin via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          port:      22
          local_path: './admin-escal/out/*'
          remote_path: 'admin'
          sftp_only: true

  # ────────────────────────────────────────────────────────────────
  calcul:
    name: Calcul → /calcul
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: modul-escal/package-lock.json
      - name: Build calcul
        working-directory: modul-escal
        run: |
          npm ci
          npm run build
      - name: Deploy calcul via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          port:      22
          local_path: './modul-escal/out/*'
          remote_path: 'calcul'
          sftp_only: true

  # ────────────────────────────────────────────────────────────────
  api:
    name: API PHP → /api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy api via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          port:      22
          local_path: './api/*'
          remote_path: 'api'
          sftp_only: true
